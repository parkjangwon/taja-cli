name: Release Binaries

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_name: taja-cli-macos-arm64.tar.gz
            binary: taja-cli

          # macOS Intel (x64)
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_name: taja-cli-macos-x64.tar.gz
            binary: taja-cli

          # Linux x64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive_name: taja-cli-linux-x64.tar.gz
            binary: taja-cli

          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_name: taja-cli-linux-arm64.tar.gz
            binary: taja-cli

          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_name: taja-cli-windows-x64.zip
            binary: taja-cli.exe

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux musl 타겟을 위한 musl-tools 설치 (x64 musl 빌드만)
      - name: Install musl-tools (Linux x64 musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # ── macOS / Linux: tar.gz 압축 ──
      - name: Archive binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf ${{ matrix.archive_name }} \
            -C target/${{ matrix.target }}/release ${{ matrix.binary }}

      # ── Windows: zip 압축 ──
      - name: Archive binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} `
            -DestinationPath ${{ matrix.archive_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "taja-cli ${{ github.ref_name }}"
          body: |
            ## ⌨️ TAJA-CLI ${{ github.ref_name }} 릴리즈

            한국인을 위한 풀스크린 TUI 타자 연습기 **taja-cli**의 새 버전이 배포되었습니다!

            ### 💻 설치 방법

            #### NPM (권장, Node.js 필요)
            ```bash
            npm install -g taja-cli
            taja
            ```

            #### Cargo (Rust 필요)
            ```bash
            cargo install taja-cli
            ```

            #### 수동 설치
            아래 Assets에서 사용 중인 플랫폼에 맞는 파일을 받아 압축 해제 후 실행하세요.
            - `taja-cli-macos-arm64.tar.gz` — macOS Apple Silicon (M1/M2/M3)
            - `taja-cli-macos-x64.tar.gz` — macOS Intel
            - `taja-cli-linux-x64.tar.gz` — Linux x64
            - `taja-cli-linux-arm64.tar.gz` — Linux ARM64
            - `taja-cli-windows-x64.zip` — Windows x64

          files: |
            taja-cli-macos-arm64.tar.gz
            taja-cli-macos-x64.tar.gz
            taja-cli-linux-x64.tar.gz
            taja-cli-linux-arm64.tar.gz
            taja-cli-windows-x64.zip
          draft: false
          prerelease: false

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync package.json version with release tag
        working-directory: npm
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          # 이미 같은 버전이어도 실패하지 않도록 npm pkg set 사용
          npm pkg set version="$VERSION"
          # 바이너리 다운로더가 참조하는 Release 태그 버전 동기화
          if [ -f bin/index.js ]; then
            sed -i "s/const VERSION = '.*'/const VERSION = '$VERSION'/" bin/index.js
          fi
          echo "Synced npm version to: $VERSION"
          node -e "console.log(require('./package.json').version)"

      - name: Publish to npm registry
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
